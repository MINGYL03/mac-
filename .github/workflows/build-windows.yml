name: build Windows exe

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build Windows exe
        shell: pwsh
        run: |
          python -m PyInstaller --onefile --noconsole --name "批量加Logo工具" logo_batch_gui.py

      - name: Zip exe
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/批量加Logo工具.exe" -DestinationPath "dist/批量加Logo工具-Windows.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LogoBatchTool-Windows
          path: dist/批量加Logo工具-Windows.zip
